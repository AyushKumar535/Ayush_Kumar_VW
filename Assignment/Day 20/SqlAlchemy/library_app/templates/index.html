{% extends "base.html" %}

{% block content %}
<h2>All Books</h2>
<table border="1">
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Author</th>
        <th>Copies</th>
        <th>Action</th>
    </tr>
    {% for book in books %}
    <tr>
        <td>{{ book.id }}</td>
        <td>{{ book.title }}</td>
        <td>{{ book.author }}</td>
        <td>{{ book.copies }}</td>
        <td>
            {% if book.copies > 0 %}
            <a href="{{ url_for('main.borrow_book', book_id=book.id) }}">Borrow</a>
            {% else %}
            Unavailable
            {% endif %}
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
