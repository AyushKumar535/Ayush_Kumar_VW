<!DOCTYPE html>
<html>
<head>
<title>Employees</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-4">

<h3>Employees</h3>

<a href="/employee/add" class="btn btn-success mb-3">Add Employee</a>

<table class="table table-bordered">

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Department</th>
<th>Actions</th>
</tr>

{% for e in emp %}

<tr>

<td>{{e.id}}</td>
<td>{{e.name}}</td>
<td>{{e.email}}</td>
<td>{{e.department}}</td>

<td>

<a href="/employee/{{e.id}}" class="btn btn-info btn-sm">View</a>
<a href="/employee/{{e.id}}/edit" class="btn btn-warning btn-sm">Edit</a>
<a href="/employee/{{e.id}}/delete" class="btn btn-danger btn-sm">Delete</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
